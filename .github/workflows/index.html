<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { font-family:Arial,sans-serif; background:transparent; }
  .widget { border:1px solid #2d6e3a; border-radius:6px; overflow:hidden; background:#fff; }
  .hdr { background:#1a5c2a; padding:8px 12px; display:flex; justify-content:space-between; align-items:center; }
  .hdr span { color:#fff; font-size:13px; font-weight:bold; }
  .hdr a { color:#c8e6a0; font-size:10px; text-decoration:none; }
  .body { padding:10px 12px; }
  table { width:100%; border-collapse:collapse; font-size:12px; margin-bottom:10px; }
  th { font-weight:normal; font-size:11px; color:#888; padding:2px 0; }
  th:first-child { text-align:left; }
  th:not(:first-child) { text-align:right; }
  td { padding:3px 0; color:#333; }
  td:first-child { color:#666; }
  td:not(:first-child) { text-align:right; font-weight:bold; color:#1a5c2a; }
  .bars { display:flex; align-items:flex-end; height:68px; border-bottom:1px solid #c5d9c8; padding-bottom:4px; gap:2px; }
  .bar-col { display:flex; flex-direction:column; align-items:center; justify-content:flex-end; flex:1; }
  .bar-rect { width:100%; background:#2d7a3e; border-radius:2px 2px 0 0; }
  .bar-yr { font-size:9px; color:#777; margin-top:2px; }
  .footer { font-size:10px; color:#bbb; text-align:right; margin-top:6px; }
  .loading { font-size:12px; color:#aaa; padding:10px 0; }
  .err { font-size:11px; color:red; }
</style>
</head>
<body>
<div class="widget">
  <div class="hdr">
    <span>Cited by</span>
    <a href="https://scholar.google.com/citations?user=dRFYT7EAAAAJ" target="_blank">VIEW ALL</a>
  </div>
  <div class="body" id="body">
    <p class="loading">Memuat data...</p>
  </div>
</div>
<script>
fetch('data.json')
  .then(r => r.json())
  .then(data => {
    var t = data.cited_by && data.cited_by.table ? data.cited_by.table : [];
    var g = data.cited_by && data.cited_by.graph ? data.cited_by.graph : [];
    var ca = t[0] && t[0].citations ? t[0].citations.all : 0;
    var cs = t[0] && t[0].citations ? t[0].citations.since_2021 : 0;
    var ha = t[1] && t[1].h_index ? t[1].h_index.all : 0;
    var hs = t[1] && t[1].h_index ? t[1].h_index.since_2021 : 0;
    var ia = t[2] && t[2].i10_index ? t[2].i10_index.all : 0;
    var is2 = t[2] && t[2].i10_index ? t[2].i10_index.since_2021 : 0;
    var maxV = 0;
    for(var i=0;i<g.length;i++) if(g[i].citations>maxV) maxV=g[i].citations;
    var bars = '';
    for(var i=0;i<g.length;i++){
      var h = maxV > 0 ? Math.round((g[i].citations/maxV)*56) : 2;
      bars += '<div class="bar-col">'
            + '<div class="bar-rect" style="height:'+h+'px" title="'+g[i].year+': '+g[i].citations+'"></div>'
            + '<span class="bar-yr">'+String(g[i].year).slice(2)+'</span>'
            + '</div>';
    }
    document.getElementById('body').innerHTML =
      '<table><tr><th></th><th>All</th><th>Since 2021</th></tr>'
      +'<tr><td>Citations</td><td>'+ca+'</td><td>'+cs+'</td></tr>'
      +'<tr><td>h-index</td><td>'+ha+'</td><td>'+hs+'</td></tr>'
      +'<tr><td>i10-index</td><td>'+ia+'</td><td>'+is2+'</td></tr>'
      +'</table>'
      +'<div class="bars">'+bars+'</div>'
      +'<p class="footer">via Google Scholar</p>';
  })
  .catch(function(){ document.getElementById('body').innerHTML='<p class="err">Gagal memuat data.</p>'; });
</script>
</body>
</html>
