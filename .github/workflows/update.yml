name: Update Scholar Data

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v3

      - name: Fetch SerpAPI data
              timeout-minutes: 2
              run: |
                curl --max-time 30 --fail \
                  "https://serpapi.com/search.json?engine=google_scholar_author&author_id=${{ secrets.SCHOLAR_ID }}&api_key=${{ secrets.SERPAPI_KEY }}" \
                  -o data.json
                echo "Berhasil! Isi data.json:"
                cat data.json | head -c 500
          
      - name: Commit and push
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data.json
          git diff --staged --quiet || git commit -m "Update scholar data"
          git push
